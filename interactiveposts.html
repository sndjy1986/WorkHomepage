<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Dispatch | Command Console v10</title>
    <style>
        :root {
            --accent: #ff3b3b;
            --call-active: #ffcc00;
            --bg-dark: #0a0a0a;
            --panel-bg: #161616;
            --oos-color: #444;
            --avail-color: #00ff41;
            --sidebar-w: 180px;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-dark); color: white; height: 100vh; overflow: hidden; display: flex; }

        /* Sidebar & Status */
        #sidebar { width: var(--sidebar-w); background: var(--panel-bg); display: flex; flex-direction: column; border-right: 2px solid #222; z-index: 100; flex-shrink: 0; }
        #system-status-box { padding: 15px; text-align: center; background: #000; border-bottom: 2px solid var(--accent); }
        #gas-gauge { font-size: 56px; font-weight: 900; line-height: 1; margin: 5px 0; }
        .gauge-label { font-size: 10px; color: #888; letter-spacing: 1px; }
        #unit-list-container { flex-grow: 1; overflow-y: auto; padding: 10px; }

        /* Workspace */
        #workspace { flex-grow: 1; display: flex; flex-direction: column; position: relative; height: 100vh; }
        
        /* Map Container & Zoom */
        #map-container { 
            flex: 1; 
            position: relative; 
            overflow: hidden; /* Changed to hidden for zoom logic */
            background: #000; 
            transition: flex 0.4s ease-in-out; 
            border-bottom: 2px solid #333; 
            cursor: crosshair;
        }
        #map-container.hidden { flex: 0 !important; height: 0 !important; border: none !important; }

        /* The actual map layer that moves and zooms */
        #map-content {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
        }

        #background-map { display: block; pointer-events: none; }

        /* Timer Section */
        #timer-section { height: 280px; background: #111; display: flex; flex-direction: column; transition: all 0.4s ease-in-out; flex-shrink: 0; z-index: 10; }
        #timer-section.maximized { height: 100% !important; flex: 1 !important; }
        #timer-header { padding: 10px 20px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        #timer-grid { flex-grow: 1; display: flex; gap: 15px; padding: 15px; overflow-x: auto; align-items: flex-start; }

        .view-btn { background: #333; color: white; border: 1px solid #555; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 11px; text-transform: uppercase; }
        .view-btn:hover { background: var(--accent); }

        /* Unit Icons */
        .unit-slot { height: 45px; border: 1px solid #222; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; position: relative; background: #0f0f0f; }
        .ambulance-icon { width: 45px; cursor: grab; display: flex; flex-direction: column; align-items: center; z-index: 50; }
        .ambulance-icon.oos { filter: grayscale(1) brightness(0.4) !important; }
        .ambulance-icon.on-call { filter: sepia(1) hue-rotate(10deg) saturate(3) !important; } 
        
        /* Flashing Alarm for Map Icons */
        .ambulance-icon.expired-alarm {
            animation: mapFlash 0.8s infinite;
            z-index: 1000;
        }
        @keyframes mapFlash {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px red); }
            50% { transform: scale(1.3); filter: drop-shadow(0 0 15px red) invert(1); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px red); }
        }

        .unit-label { font-size: 10px; font-weight: bold; background: #000; padding: 1px 4px; border-radius: 2px; }

        /* Context Menu */
        #context-menu { position: fixed; display: none; background: #1a1a1a; border: 1px solid #444; z-index: 10000; width: 175px; box-shadow: 0 10px 25px rgba(0,0,0,0.7); }
        .menu-item { padding: 10px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #222; }
        .menu-item:hover { background: var(--accent); color: white; }

        .timer-card { min-width: 180px; background: #222; border-top: 4px solid var(--accent); padding: 12px; border-radius: 4px; position: relative; }
        .timer-card.type-logistics { border-top-color: #888; }
        .timer-display { font-family: 'Courier New', monospace; font-size: 32px; margin: 5px 0; color: white; }
        .timer-card.expired { animation: alert 0.8s infinite; }
        @keyframes alert { 50% { background: #4d0000; } }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="system-status-box">
            <div class="gauge-label">FLEET STATUS</div>
            <div id="gas-gauge">0</div>
            <div class="gauge-label">AVAILABLE UNITS</div>
        </div>
        <div id="unit-list-container"></div>
    </div>

    <div id="workspace">
        <div id="map-container">
            <div id="map-content">
                <img src="map.jpeg" id="background-map">
            </div>
        </div>

        <div id="timer-section">
            <div id="timer-header">
                <div>
                    <button class="view-btn" onclick="setView('map')">Map View</button>
                    <button class="view-btn" onclick="setView('split')">Split View</button>
                    <button class="view-btn" onclick="setView('timer')">Timer View</button>
                    <button class="view-btn" onclick="resetZoom()" style="margin-left:10px; background:#222;">Reset Zoom</button>
                </div>
                <div style="font-size: 11px; color: #555; letter-spacing: 2px; font-weight: bold;">SYSTEM STATUS PANEL</div>
            </div>
            <div id="timer-grid"></div>
        </div>
    </div>

    <div id="context-menu">
        <div style="padding: 8px; font-size: 10px; color: #888; background: #000; text-align: center;" id="menu-id">UNIT</div>
        <div class="menu-item" style="color: var(--call-active); font-weight: bold;" onclick="toggleCallState()">ON A CALL (Toggle)</div>
        <div class="menu-item" onclick="startTimer(20, 'GMH', 'hosp')">Hosp: GMH (20m)</div>
        <div class="menu-item" onclick="startTimer(20, 'AMH', 'hosp')">Hosp: AMH (20m)</div>
        <div class="menu-item" onclick="startTimer(20, 'APE', 'hosp')">Hosp: APE (20m)</div>
        <div class="menu-item" onclick="startTimer(20, 'SFCH', 'hosp')">Hosp: SFCH (20m)</div>
        <div class="menu-item" onclick="startTimer(20, 'BMC', 'hosp')">Hosp: BMC (20m)</div>
        <div class="menu-item" onclick="startTimer(10, 'Logistics', 'logistics')">Logistics (10m)</div>
        <div class="menu-item" onclick="toggleOOS()" style="color: #888; border-top: 1px solid #333;">Toggle OOS</div>
    </div>

    <script>
        const unitList = ["Med-0", "Med-1", "Med-2", "Med-3", "Med-4", "Med-5", "Med-6", "Med-7", "Med-8", "Med-9", "Med-12", "Med-13", "Med-14", "Med-15", "Med-16", "Med-17", "Med-18"];
        const mapContainer = document.getElementById('map-container');
        const mapContent = document.getElementById('map-content');
        const timerSec = document.getElementById('timer-section');
        const timerGrid = document.getElementById('timer-grid');
        const gauge = document.getElementById('gas-gauge');
        const ctxMenu = document.getElementById('context-menu');
        let selectedUnit = null;

        // Zoom/Pan State
        let scale = 1, posX = 0, posY = 0;

        function setView(mode) {
            mapContainer.classList.remove('hidden');
            timerSec.classList.remove('maximized');
            timerSec.style.height = ""; 
            if (mode === 'map') timerSec.style.height = "45px";
            else if (mode === 'split') timerSec.style.height = "280px";
            else if (mode === 'timer') { mapContainer.classList.add('hidden'); timerSec.classList.add('maximized'); }
        }

        // --- ZOOM LOGIC ---
        mapContainer.onwheel = e => {
            e.preventDefault();
            const xs = (e.clientX - mapContainer.getBoundingClientRect().left - posX) / scale;
            const ys = (e.clientY - mapContainer.getBoundingClientRect().top - posY) / scale;
            const delta = -e.deltaY;
            (delta > 0) ? (scale *= 1.1) : (scale /= 1.1);
            posX = (e.clientX - mapContainer.getBoundingClientRect().left) - xs * scale;
            posY = (e.clientY - mapContainer.getBoundingClientRect().top) - ys * scale;
            updateTransform();
        };

        function updateTransform() {
            mapContent.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        function resetZoom() { scale = 1; posX = 0; posY = 0; updateTransform(); }

        function updateGauge() {
            const avail = document.querySelectorAll('#unit-list-container .ambulance-icon:not(.oos):not(.on-call)').length;
            gauge.innerText = avail;
            gauge.style.color = avail <= 2 ? "#ff3b3b" : avail <= 5 ? "#ffcc00" : "#00ff41";
        }

        function init() {
            unitList.forEach(id => {
                const slot = document.createElement('div');
                slot.className = 'unit-slot'; slot.id = `slot-${id}`;
                document.getElementById('unit-list-container').appendChild(slot);
                const div = document.createElement('div');
                div.className = 'ambulance-icon'; div.id = id;
                div.innerHTML = `<span style="font-size:20px">🚑</span><span class="unit-label" style="color:var(--accent)">${id}</span>`;
                
                div.oncontextmenu = (e) => {
                    e.preventDefault();
                    selectedUnit = id;
                    document.getElementById('menu-id').innerText = id;
                    ctxMenu.style.display = 'block';
                    const menuH = 320, menuW = 175;
                    let pX = e.pageX, pY = e.pageY;
                    if ((pX + menuW) > window.innerWidth) pX = window.innerWidth - menuW - 10;
                    if ((pY + menuH) > window.innerHeight) pY = window.innerHeight - menuH - 10;
                    ctxMenu.style.left = pX + 'px'; ctxMenu.style.top = pY + 'px';
                };

                if (localStorage.getItem(`oos-${id}`) === 'true') div.classList.add('oos');
                if (localStorage.getItem(`call-${id}`) === 'true') div.classList.add('on-call');

                const savedPos = localStorage.getItem(`pos-${id}`);
                if (savedPos) {
                    const pos = JSON.parse(savedPos);
                    div.style.position = 'absolute'; div.style.left = pos.left; div.style.top = pos.top;
                    mapContent.appendChild(div);
                } else {
                    div.style.position = "relative"; slot.appendChild(div);
                }
                makeDraggable(div);
            });
            updateGauge();
        }

        function toggleCallState() {
            const el = document.getElementById(selectedUnit);
            el.classList.toggle('on-call');
            localStorage.setItem(`call-${selectedUnit}`, el.classList.contains('on-call'));
            ctxMenu.style.display = 'none';
            updateGauge();
        }

        function toggleOOS() {
            const el = document.getElementById(selectedUnit);
            el.classList.toggle('oos');
            localStorage.setItem(`oos-${selectedUnit}`, el.classList.contains('oos'));
            ctxMenu.style.display = 'none';
            updateGauge();
        }

        function startTimer(min, hospitalName, type) {
            const unitId = selectedUnit;
            const unitEl = document.getElementById(unitId);
            const timerId = Date.now();
            
            if (!unitEl.classList.contains('on-call')) {
                unitEl.classList.add('on-call');
                localStorage.setItem(`call-${unitId}`, 'true');
            }

            const card = document.createElement('div');
            card.className = `timer-card type-${type}`;
            card.id = `card-${timerId}`;
            card.dataset.unit = unitId;
            
            card.innerHTML = `
                <div style="font-weight:bold; font-size:18px;">${unitId}</div>
                <div style="font-size:11px; color:#888; font-weight:bold; margin-bottom:5px;">${hospitalName}</div>
                <div class="timer-display" id="time-${timerId}">--:--</div>
                <button onclick="dismissTimer('${timerId}', '${unitId}')" style="width:100%; font-size:10px; background:#444; color:white; border:none; padding:5px; cursor:pointer; border-radius:3px;">DISMISS</button>
            `;
            timerGrid.appendChild(card);
            ctxMenu.style.display = 'none';
            updateGauge();

            let sec = min * 60;
            const run = setInterval(() => {
                const el = document.getElementById(`time-${timerId}`);
                if(!el) { clearInterval(run); return; }
                sec--;
                const a = Math.abs(sec);
                const m = Math.floor(a / 60).toString().padStart(2, '0');
                const s = (a % 60).toString().padStart(2, '0');
                el.innerText = (sec < 0 ? "-" : "") + `${m}:${s}`;
                
                if(sec < 0) {
                    card.classList.add('expired');
                    unitEl.classList.add('expired-alarm'); // FLASH ON MAP
                }
            }, 1000);
        }

        function dismissTimer(tId, uId) {
            const card = document.getElementById(`card-${tId}`);
            if(card) card.remove();
            
            const otherTimers = document.querySelectorAll(`.timer-card[data-unit="${uId}"]`);
            if (otherTimers.length === 0) {
                const unitEl = document.getElementById(uId);
                unitEl.classList.remove('on-call');
                unitEl.classList.remove('expired-alarm');
                localStorage.setItem(`call-${uId}`, 'false');
            }
            updateGauge();
        }

        function makeDraggable(el) {
            let ox = 0, oy = 0;
            el.onmousedown = (e) => {
                if(e.button !== 0) return;
                const r = el.getBoundingClientRect();
                ox = (e.clientX - r.left) / scale;
                oy = (e.clientY - r.top) / scale;
                
                if (el.parentElement.classList.contains('unit-slot')) {
                    el.style.position = 'absolute';
                    mapContent.appendChild(el);
                }
                document.onmousemove = (ev) => {
                    const c = mapContent.getBoundingClientRect();
                    el.style.left = ((ev.clientX - c.left) / scale - ox) + "px";
                    el.style.top = ((ev.clientY - c.top) / scale - oy) + "px";
                };
                document.onmouseup = (ev) => {
                    document.onmousemove = null;
                    if (ev.clientX < 180) {
                        document.getElementById(`slot-${el.id}`).appendChild(el);
                        el.style.position = "relative"; el.style.left = "0"; el.style.top = "0";
                        localStorage.removeItem(`pos-${el.id}`);
                    } else {
                        localStorage.setItem(`pos-${el.id}`, JSON.stringify({left: el.style.left, top: el.style.top}));
                    }
                    updateGauge();
                };
            };
        }

        window.onclick = () => ctxMenu.style.display = 'none';
        init();
    </script>
</body>
</html>
