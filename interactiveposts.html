<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Dispatch Command</title>
    <style>
        :root {
            --sidebar-width: 180px;
            --timer-height: 250px;
            --accent: #ff3b3b;
            --bg-dark: #0f0f0f;
            --panel-bg: #1e1e1e;
            --warning: #ffcc00;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg-dark); color: white; height: 100vh; overflow: hidden; }
        
        /* Layout Controls */
        #sidebar { width: var(--sidebar-width); background: var(--panel-bg); display: flex; flex-direction: column; border-right: 2px solid #333; transition: 0.3s; position: relative; }
        #sidebar.collapsed { width: 0; padding: 0; overflow: hidden; border: none; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }

        /* Map Section */
        #map-container { flex-grow: 1; position: relative; overflow: auto; background: #000; transition: 0.3s; }
        #map-container.hidden { flex-grow: 0; height: 0; }
        #background-map { display: block; min-width: 100%; }

        /* Timer Section */
        #timer-section { height: var(--timer-height); background: #111; border-top: 2px solid #444; display: flex; flex-direction: column; transition: 0.3s; }
        #timer-section.maximized { height: 100vh; }
        
        .timer-header { padding: 10px; background: #222; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #333; }
        #timer-grid { flex-grow: 1; display: flex; gap: 15px; padding: 15px; overflow-x: auto; align-items: flex-start; }

        /* Timer Cards */
        .timer-card {
            min-width: 200px;
            background: #252525;
            border-top: 4px solid var(--accent);
            padding: 12px;
            border-radius: 4px;
            position: relative;
        }
        .timer-card.expired { animation: flash 1s infinite; border-top-color: #ff0000; }
        .timer-card.expired .timer-display { color: #ff5555; }
        
        @keyframes flash {
            0% { background: #252525; }
            50% { background: #4d0000; }
            100% { background: #252525; }
        }

        .timer-display { font-family: 'Courier New', monospace; font-size: 32px; font-weight: bold; margin: 5px 0; }

        /* UI Elements */
        .unit-slot { height: 60px; border: 1px solid #333; margin: 5px; display: flex; align-items: center; justify-content: center; background: #151515; }
        .ambulance-icon { width: 50px; cursor: grab; display: flex; flex-direction: column; align-items: center; z-index: 100; position: absolute; }
        .unit-label { font-size: 10px; color: var(--accent); font-weight: bold; background: black; padding: 0 4px; }
        
        /* Buttons */
        button { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        button:hover { background: #444; }
        select { background: #333; color: white; border: 1px solid #555; padding: 5px; }

        .view-toggle { position: absolute; bottom: 10px; right: 10px; z-index: 3000; display: flex; gap: 5px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding: 10px; font-size: 12px; color: #888; border-bottom: 1px solid #333;">UNITS</div>
        <div id="unit-list-container" style="overflow-y: auto;"></div>
    </div>

    <div id="main-content">
        <div id="map-container">
            <img src="map.jpeg" id="background-map">
        </div>

        <div id="timer-section">
            <div class="timer-header">
                <span style="font-weight: bold; font-size: 14px; margin-right: 10px;">DISPATCH PANEL</span>
                <select id="unit-select"></select>
                <select id="status-select">
                    <option value="20">At Destination (20m)</option>
                    <option value="10">Logistics (10m)</option>
                    <option value="5">Standard (5m)</option>
                </select>
                <button onclick="startNewTimer()">START TIMER</button>
            </div>
            <div id="timer-grid"></div>
        </div>

        <div class="view-toggle">
            <button onclick="toggleSidebar()">Toggle List</button>
            <button onclick="toggleMap()">Toggle Map</button>
            <button onclick="toggleTimers()">Full Timers</button>
        </div>
    </div>

    <script>
        const units = ["Med-0", "Med-1", "Med-2", "Med-3", "Med-4", "Med-5", "Med-6", "Med-7", "Med-8", "Med-9", "Med-12", "Med-13", "Med-14", "Med-15", "Med-16", "Med-17", "Med-18"];
        const grid = document.getElementById('timer-grid');
        const unitSelect = document.getElementById('unit-select');
        const sidebar = document.getElementById('sidebar');
        const mapCont = document.getElementById('map-container');
        const timerSec = document.getElementById('timer-section');

        // Initialize Units
        function init() {
            units.forEach(id => {
                // Populate Sidebar
                const slot = document.createElement('div');
                slot.className = 'unit-slot';
                slot.id = `slot-${id}`;
                document.getElementById('unit-list-container').appendChild(slot);

                const div = document.createElement('div');
                div.className = 'ambulance-icon';
                div.id = id;
                div.innerHTML = `<span style="font-size:24px">🚑</span><span class="unit-label">${id}</span>`;
                
                // Position logic
                const saved = localStorage.getItem(`pos-${id}`);
                if(saved) {
                    const p = JSON.parse(saved);
                    div.style.left = p.left; div.style.top = p.top;
                    mapCont.appendChild(div);
                } else {
                    div.style.position = "relative";
                    slot.appendChild(div);
                }
                makeDraggable(div);

                // Populate Dropdown
                let opt = document.createElement('option');
                opt.value = id; opt.innerText = id;
                unitSelect.appendChild(opt);
            });
        }

        // Layout Toggles
        function toggleSidebar() { sidebar.classList.toggle('collapsed'); }
        function toggleMap() { mapCont.classList.toggle('hidden'); }
        function toggleTimers() { timerSec.classList.toggle('maximized'); }

        // Timer Logic
        function startNewTimer() {
            const unit = unitSelect.value;
            const duration = parseInt(document.getElementById('status-select').value) * 60;
            const id = Date.now();
            
            const card = document.createElement('div');
            card.className = 'timer-card';
            card.id = `card-${id}`;
            
            card.innerHTML = `
                <div style="font-weight:bold; color:var(--accent)">${unit}</div>
                <div style="font-size:10px; color:#888">${document.getElementById('status-select').selectedOptions[0].text}</div>
                <div class="timer-display" id="time-${id}">--:--</div>
                <button onclick="this.parentElement.remove()" style="width:100%; margin-top:5px; font-size:10px;">CLEAR</button>
            `;
            grid.appendChild(card);

            let timeLeft = duration;
            const interval = setInterval(() => {
                const display = document.getElementById(`time-${id}`);
                if (!display) { clearInterval(interval); return; }

                timeLeft--;
                const isExpired = timeLeft < 0;
                const absTime = Math.abs(timeLeft);
                const m = Math.floor(absTime / 60).toString().padStart(2, '0');
                const s = (absTime % 60).toString().padStart(2, '0');

                display.innerText = (isExpired ? "-" : "") + `${m}:${s}`;

                if (isExpired && !card.classList.contains('expired')) {
                    card.classList.add('expired');
                }
            }, 1000);
        }

        // Dragging Logic (Optimized)
        function makeDraggable(el) {
            let offX = 0, offY = 0;
            el.onmousedown = (e) => {
                const rect = el.getBoundingClientRect();
                offX = e.clientX - rect.left;
                offY = e.clientY - rect.top;
                if (el.parentElement.classList.contains('unit-slot')) {
                    el.style.position = 'absolute';
                    mapCont.appendChild(el);
                }
                document.onmousemove = (ev) => {
                    const c = mapCont.getBoundingClientRect();
                    el.style.left = (ev.clientX - c.left - offX) + "px";
                    el.style.top = (ev.clientY - c.top - offY) + "px";
                };
                document.onmouseup = (ev) => {
                    document.onmousemove = null;
                    if (ev.clientX < 180) {
                        const s = document.getElementById(`slot-${el.id}`);
                        el.style.position = "relative"; el.style.left = "0"; el.style.top = "0";
                        s.appendChild(el);
                        localStorage.removeItem(`pos-${el.id}`);
                    } else {
                        localStorage.setItem(`pos-${el.id}`, JSON.stringify({left: el.style.left, top: el.style.top}));
                    }
                };
            };
        }

        init();
    </script>
</body>
</html>
