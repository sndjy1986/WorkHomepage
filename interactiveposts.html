<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Dispatch | System Status 18</title>
    <style>
        :root {
            --accent: #ff3b3b;
            --bg-dark: #0f0f0f;
            --panel-bg: #1e1e1e;
            --oos-color: #555;
            --avail-color: #00ff41;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg-dark); color: white; height: 100vh; overflow: hidden; }
        
        /* Sidebar & Status */
        #sidebar { width: 200px; background: var(--panel-bg); display: flex; flex-direction: column; border-right: 2px solid #333; transition: 0.3s; }
        
        #system-status-box {
            padding: 20px;
            text-align: center;
            background: #111;
            border-bottom: 2px solid #333;
        }
        
        #gas-gauge {
            font-size: 48px;
            font-weight: 900;
            color: var(--avail-color);
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }
        .gauge-label { font-size: 12px; color: #888; letter-spacing: 2px; }

        #unit-list-container { flex-grow: 1; overflow-y: auto; padding: 10px; }

        /* Main Area */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; }
        #map-container { flex-grow: 1; position: relative; overflow: auto; background: #000; }
        #background-map { display: block; min-width: 100%; }

        /* Timer Section */
        #timer-section { height: 220px; background: #111; border-top: 2px solid #444; display: flex; gap: 15px; padding: 15px; overflow-x: auto; }

        /* Unit Icons */
        .unit-slot { height: 50px; border: 1px dashed #333; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; position: relative; }
        .ambulance-icon { width: 50px; cursor: grab; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        .unit-label { font-size: 11px; font-weight: bold; background: black; padding: 0 4px; border-radius: 3px; margin-top: -2px; }
        
        /* OOS State */
        .ambulance-icon.oos { filter: grayscale(1) opacity(0.5); }
        .ambulance-icon.oos .unit-label { color: #fff; background: #444; }

        /* Custom Context Menu */
        #context-menu {
            position: fixed;
            display: none;
            background: #222;
            border: 1px solid #444;
            z-index: 10000;
            width: 180px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }
        .menu-item { padding: 10px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #333; }
        .menu-item:hover { background: var(--accent); color: white; }
        .menu-header { background: #000; padding: 5px 10px; font-size: 10px; color: #888; }

        /* Timer Cards */
        .timer-card { min-width: 180px; background: #252525; border-top: 4px solid var(--accent); padding: 10px; border-radius: 4px; position: relative; height: fit-content; }
        .timer-display { font-family: monospace; font-size: 28px; margin: 5px 0; }
        .expired { animation: flash 1s infinite; }
        @keyframes flash { 50% { background: #4d0000; } }

        .view-controls { position: absolute; top: 10px; right: 10px; z-index: 5000; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="system-status-box">
            <div class="gauge-label">SYSTEM STATUS</div>
            <div id="gas-gauge">0</div>
            <div class="gauge-label">UNITS AVAIL</div>
        </div>
        <div id="unit-list-container"></div>
    </div>

    <div id="main-content">
        <div id="map-container">
            <div class="view-controls">
                <button onclick="document.getElementById('timer-section').style.display = (document.getElementById('timer-section').style.display == 'none' ? 'flex' : 'none')">Toggle Timers</button>
            </div>
            <img src="map.jpeg" id="background-map">
        </div>
        <div id="timer-section"></div>
    </div>

    <div id="context-menu">
        <div class="menu-header" id="menu-unit-id">UNIT ID</div>
        <div class="menu-item" onclick="setTimer(20, 'GMH')">Hosp: GMH (20m)</div>
        <div class="menu-item" onclick="setTimer(20, 'AMH')">Hosp: AMH (20m)</div>
        <div class="menu-item" onclick="setTimer(20, 'APE')">Hosp: APE (20m)</div>
        <div class="menu-item" onclick="setTimer(20, 'SFCH')">Hosp: SFCH (20m)</div>
        <div class="menu-item" onclick="setTimer(20, 'BMC')">Hosp: BMC (20m)</div>
        <div class="menu-item" onclick="setTimer(10, 'Logistics')">Logistics (10m)</div>
        <div class="menu-item" style="color: #ffaa00" onclick="toggleOOS()">Toggle Out of Service</div>
    </div>

    <script>
        const unitList = ["Med-0", "Med-1", "Med-2", "Med-3", "Med-4", "Med-5", "Med-6", "Med-7", "Med-8", "Med-9", "Med-12", "Med-13", "Med-14", "Med-15", "Med-16", "Med-17", "Med-18"];
        const container = document.getElementById('map-container');
        const timerSection = document.getElementById('timer-section');
        const gauge = document.getElementById('gas-gauge');
        const ctxMenu = document.getElementById('context-menu');
        
        let activeUnit = null;

        function updateSystemStatus() {
            // Count units that are in the sidebar AND not OOS
            const avail = document.querySelectorAll('#unit-list-container .ambulance-icon:not(.oos)').length;
            gauge.innerText = avail;
            // Color logic for gauge
            gauge.style.color = avail <= 2 ? "#ff3b3b" : avail <= 5 ? "#ffcc00" : "#00ff41";
        }

        function init() {
            unitList.forEach(id => {
                const slot = document.createElement('div');
                slot.className = 'unit-slot';
                slot.id = `slot-${id}`;
                document.getElementById('unit-list-container').appendChild(slot);

                const div = document.createElement('div');
                div.className = 'ambulance-icon';
                div.id = id;
                div.innerHTML = `<span style="font-size:24px">🚑</span><span class="unit-label" style="color:red">${id}</span>`;
                
                // Context Menu Listener
                div.oncontextmenu = (e) => {
                    e.preventDefault();
                    activeUnit = id;
                    document.getElementById('menu-unit-id').innerText = id;
                    ctxMenu.style.display = 'block';
                    ctxMenu.style.left = e.pageX + 'px';
                    ctxMenu.style.top = e.pageY + 'px';
                };

                const savedPos = localStorage.getItem(`pos-${id}`);
                const isOOS = localStorage.getItem(`oos-${id}`) === 'true';
                if(isOOS) div.classList.add('oos');

                if (savedPos) {
                    const pos = JSON.parse(savedPos);
                    div.style.position = 'absolute';
                    div.style.left = pos.left; div.style.top = pos.top;
                    container.appendChild(div);
                } else {
                    div.style.position = "relative";
                    slot.appendChild(div);
                }
                makeDraggable(div);
            });
            updateSystemStatus();
        }

        function toggleOOS() {
            const el = document.getElementById(activeUnit);
            el.classList.toggle('oos');
            localStorage.setItem(`oos-${activeUnit}`, el.classList.contains('oos'));
            ctxMenu.style.display = 'none';
            updateSystemStatus();
        }

        function setTimer(minutes, location) {
            const id = Date.now();
            const card = document.createElement('div');
            card.className = 'timer-card';
            card.innerHTML = `
                <div style="font-weight:bold; color:red">${activeUnit}</div>
                <div style="font-size:11px; color:#888">${location}</div>
                <div class="timer-display" id="t-${id}">--:--</div>
                <button onclick="this.parentElement.remove()" style="width:100%; font-size:10px; background:#333; color:white; border:none; padding:4px;">CLEAR</button>
            `;
            timerSection.appendChild(card);
            ctxMenu.style.display = 'none';

            let seconds = minutes * 60;
            const ticker = setInterval(() => {
                const display = document.getElementById(`t-${id}`);
                if(!display) { clearInterval(ticker); return; }
                seconds--;
                const absSec = Math.abs(seconds);
                const m = Math.floor(absSec / 60).toString().padStart(2, '0');
                const s = (absSec % 60).toString().padStart(2, '0');
                display.innerText = (seconds < 0 ? "-" : "") + `${m}:${s}`;
                if(seconds < 0) card.classList.add('expired');
            }, 1000);
        }

        function makeDraggable(el) {
            let offX = 0, offY = 0;
            el.onmousedown = (e) => {
                if(e.button !== 0) return; // Only left click drags
                const rect = el.getBoundingClientRect();
                offX = e.clientX - rect.left;
                offY = e.clientY - rect.top;
                if (el.parentElement.classList.contains('unit-slot')) {
                    el.style.position = 'absolute';
                    container.appendChild(el);
                }
                document.onmousemove = (ev) => {
                    const c = container.getBoundingClientRect();
                    el.style.left = (ev.clientX - c.left - offX) + "px";
                    el.style.top = (ev.clientY - c.top - offY) + "px";
                };
                document.onmouseup = (ev) => {
                    document.onmousemove = null;
                    if (ev.clientX < 200) {
                        document.getElementById(`slot-${el.id}`).appendChild(el);
                        el.style.position = "relative"; el.style.left = "0"; el.style.top = "0";
                        localStorage.removeItem(`pos-${el.id}`);
                    } else {
                        localStorage.setItem(`pos-${el.id}`, JSON.stringify({left: el.style.left, top: el.style.top}));
                    }
                    updateSystemStatus();
                };
            };
        }

        // Hide context menu on click elsewhere
        window.onclick = () => ctxMenu.style.display = 'none';

        init();
    </script>
</body>
</html>
